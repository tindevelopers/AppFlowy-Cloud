name: Build and Push to GHCR

# Builds custom Tin images for appflowy_cloud and appflowy_worker
# (containing mailer rebranding and other Tin-specific changes) and
# pushes them to GitHub Container Registry (ghcr.io/tindevelopers/*).
#
# The Hetzner VPS pulls these images via docker compose pull.
# No Docker Hub credentials required — GHCR uses the built-in GITHUB_TOKEN.
#
# VPS auth (one-time setup):
#   echo "<PAT-with-read:packages>" | docker login ghcr.io -u tindevelopers --password-stdin
# Or make the packages public in GitHub settings (no login needed).

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: tindevelopers

jobs:
  appflowy_cloud:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/appflowy_cloud
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push appflowy_cloud
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          build-args: |
            PROFILE=release
            FEATURES=
          cache-from: type=gha
          cache-to: type=gha,mode=max

  appflowy_worker:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/appflowy_worker
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push appflowy_worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/appflowy-worker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          build-args: |
            PROFILE=release
          cache-from: type=gha
          cache-to: type=gha,mode=max
